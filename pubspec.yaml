name: tazalens
description: AR Quality Control for Polyester Fiber Packaging
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.4.0 <4.0.0'
  flutter: '>=3.22.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6

  go_router: ^14.0.0
  flutter_riverpod: ^2.5.0

  camera: ^0.10.6

  tflite_flutter: ^0.11.0

  image: ^4.2.0

  sqflite: ^2.3.3
  path_provider: ^2.1.3
  path: ^1.9.0
  shared_preferences: ^2.3.0

  google_fonts: ^6.2.1
  share_plus: ^9.0.0
  intl: ^0.19.0
  uuid: ^4.4.0

  js: ^0.7.1

dev_dependencies:
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/models/yolov8_web_model/model.json
    - assets/models/yolov8_web_model/model.weights.bin
    - assets/models/yolov8n.tflite
    - assets/labels/coco_labels.txt
    - assets/references/dust_ref.jpeg
