<!DOCTYPE html>
<html lang="ru">
<head>
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="description" content="CleanPack AR — AR Quality Control for Polyester Fiber Packaging">

  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="CleanPack AR">
  <meta name="theme-color" content="#00FF88">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <link rel="icon" type="image/png" href="favicon.png"/>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">

  <title>CleanPack AR</title>
  <link rel="manifest" href="manifest.json">

  <style>
    html, body { margin: 0; padding: 0; background: #050505; font-family: 'JetBrains Mono', monospace; }
    #cp-video { display: none; }
  </style>

  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.20.0/dist/tf.min.js"></script>
  <script>
    let cpModel = null;
    let cpVideo = null;
    const cpCanvas = document.createElement('canvas');
    cpCanvas.width = 640; cpCanvas.height = 640;

    // ────────────────────────────────────────────────────────
    // SELF-REFERENCING LOCAL CONTRAST DETECTOR
    // No reference image needed. Works by analyzing the frame
    // itself: a clean surface has uniform tiles (low variance).
    // Dust/particles create high-variance tiles on an otherwise
    // uniform background.
    // ────────────────────────────────────────────────────────
    const DET_W = 160, DET_H = 120, TILE = 8;

    function detectContamination(videoEl) {
      const c = document.createElement('canvas');
      c.width = DET_W; c.height = DET_H;
      const ctx = c.getContext('2d');
      ctx.drawImage(videoEl, 0, 0, DET_W, DET_H);
      const data = ctx.getImageData(0, 0, DET_W, DET_H).data;

      const tilesX = Math.floor(DET_W / TILE);
      const tilesY = Math.floor(DET_H / TILE);
      const tileStats = [];

      // Pass 1: compute per-tile mean and variance
      for (let ty = 0; ty < tilesY; ty++) {
        for (let tx = 0; tx < tilesX; tx++) {
          let sum = 0, count = 0;
          const vals = [];
          for (let y = ty*TILE; y < (ty+1)*TILE; y++) {
            for (let x = tx*TILE; x < (tx+1)*TILE; x++) {
              const i = (y * DET_W + x) * 4;
              const luma = 0.299*data[i] + 0.587*data[i+1] + 0.114*data[i+2];
              vals.push(luma);
              sum += luma;
              count++;
            }
          }
          const mean = sum / count;
          let varSum = 0;
          for (const v of vals) varSum += (v - mean) * (v - mean);
          const variance = varSum / count;
          tileStats.push({ tx, ty, mean, variance });
        }
      }

      // Pass 2: compute global median variance (= "normal" surface texture)
      const sortedVar = tileStats.map(t => t.variance).sort((a,b) => a - b);
      const medianVar = sortedVar[Math.floor(sortedVar.length / 2)];
      // Also compute global mean brightness
      const globalMean = tileStats.reduce((s, t) => s + t.mean, 0) / tileStats.length;

      // Pass 3: flag tiles with abnormal variance
      // A tile with variance >> median indicates particles
      // Threshold adapts: on uniform surfaces (low medianVar), even small
      // deviations matter. On textured surfaces, we need bigger jumps.
      // Lowered multiplier 3.0→2.0 and floor 40→20 for higher recall
      const varThreshold = Math.max(medianVar * 2.0, 20);

      const anomalies = [];
      for (const t of tileStats) {
        if (t.variance > varThreshold) {
          const meanDiff = Math.abs(t.mean - globalMean);
          if (meanDiff > 5 || t.variance > varThreshold * 1.5) {
            anomalies.push(t);
          }
        }
      }

      if (anomalies.length === 0) return '[]';

      // Skip if >45% of tiles anomalous — whole scene changed, not a local defect
      if (anomalies.length > tileStats.length * 0.45) return '[]';

      // Union-find cluster: group tiles within 2-tile distance into separate bboxes
      const n = anomalies.length;
      const parent = Array.from({length: n}, (_, i) => i);
      function find(i) { while (parent[i] !== i) { parent[i] = parent[parent[i]]; i = parent[i]; } return i; }
      function union(a, b) { parent[find(a)] = find(b); }
      for (let i = 0; i < n; i++)
        for (let j = i + 1; j < n; j++)
          if (Math.abs(anomalies[i].tx - anomalies[j].tx) <= 2 &&
              Math.abs(anomalies[i].ty - anomalies[j].ty) <= 2)
            union(i, j);

      const groups = {};
      for (let i = 0; i < n; i++) {
        const r = find(i);
        if (!groups[r]) groups[r] = [];
        groups[r].push(anomalies[i]);
      }

      // Build one detection per cluster, return top 4 by size
      const results = Object.values(groups)
        .sort((a, b) => b.length - a.length)
        .slice(0, 4)
        .map(group => {
          let minX = 9999, minY = 9999, maxX = -1, maxY = -1;
          for (const a of group) {
            const px = a.tx * TILE, py = a.ty * TILE;
            if (px < minX) minX = px;
            if (py < minY) minY = py;
            if (px + TILE > maxX) maxX = px + TILE;
            if (py + TILE > maxY) maxY = py + TILE;
          }
          return {
            classIndex: 82,
            confidence: Math.min(0.55 + group.length * 0.05, 0.98),
            x1: minX / DET_W * 640, y1: minY / DET_H * 640,
            x2: maxX / DET_W * 640, y2: maxY / DET_H * 640,
            canvasWidth: 640, canvasHeight: 640
          };
        });

      return JSON.stringify(results);
    }

    // ────────────────────────────────────────────────────────
    // YOLO MODEL (optional, not required for dust detection)
    // ────────────────────────────────────────────────────────
    window.loadYoloModel = async function(modelUrl) {
      try {
        cpModel = await tf.loadGraphModel(modelUrl);
        const dummy = tf.zeros([1, 640, 640, 3]);
        await cpModel.executeAsync(dummy);
        dummy.dispose();
        console.log('[CleanPack] YOLO web model ready');
      } catch (e) {
        console.warn('[CleanPack] YOLO not loaded, using local contrast detector', e);
        cpModel = null;
      }
    };

    // ────────────────────────────────────────────────────────
    // MAIN DETECTION ENTRY POINT (called from Dart every 200ms)
    // ────────────────────────────────────────────────────────
    window.detectOnVideo = async function() {
      if (!cpVideo) {
        cpVideo = document.querySelector('video');
        if (!cpVideo) return '[]';
      }
      if (cpVideo.readyState < 2) return '[]';

      // PRIMARY: Self-referencing local contrast (catches dust)
      const contaminationResult = detectContamination(cpVideo);
      if (contaminationResult !== '[]') {
        return contaminationResult;
      }

      // SECONDARY: YOLO (if loaded, catches large objects)
      if (cpModel) {
        const ctx = cpCanvas.getContext('2d');
        ctx.drawImage(cpVideo, 0, 0, cpCanvas.width, cpCanvas.height);
        const input = tf.tidy(() =>
          tf.browser.fromPixels(cpCanvas).div(255.0).expandDims(0));
        const out = cpModel.execute(input);
        const data = await out.data();
        tf.dispose([input, out]);
        return JSON.stringify(parseYolo(data, cpCanvas.width, cpCanvas.height));
      }

      return '[]';
    };

    function parseYolo(data, cw, ch) {
      const numBoxes = 8400, numClasses = 80, threshold = 0.25;
      const objects = [];
      for (let i = 0; i < numBoxes; i++) {
        let maxScore = 0, maxClass = 0;
        for (let c = 0; c < numClasses; c++) {
          const s = data[(4 + c) * numBoxes + i];
          if (s > maxScore) { maxScore = s; maxClass = c; }
        }
        if (maxScore < threshold) continue;
        const cx = data[0 * numBoxes + i];
        const cy = data[1 * numBoxes + i];
        const w  = data[2 * numBoxes + i];
        const h  = data[3 * numBoxes + i];
        objects.push({
          classIndex: maxClass,
          confidence: maxScore,
          x1: (cx - w/2) / 640 * cw,
          y1: (cy - h/2) / 640 * ch,
          x2: (cx + w/2) / 640 * cw,
          y2: (cy + h/2) / 640 * ch,
          canvasWidth: cw,
          canvasHeight: ch,
        });
      }
      return objects;
    }
  </script>
</head>
<body>
  <video id="cp-video" autoplay playsinline muted></video>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
